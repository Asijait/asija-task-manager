<div id="sudoku-container" class="side-panel">
    <div class="panel-header">
        <span>Sudoku Game 🧩</span>
        <button onclick="closeSudoku()" class="close-btn">&times;</button>
    </div>
    <div class="sudoku-grid-container">
        <div id="sudoku-grid" class="sudoku-grid"></div>
    </div>
    <div class="sudoku-controls">
        <button onclick="generateNewGame()" class="game-btn">New Game</button>
        <button onclick="checkSudoku()" class="game-btn check">Check Solution</button>
    </div>
    <div id="sudoku-message"></div>
</div>
