<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register New User - Task Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .register-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--theme-page-bg);
        }
        .register-card {
            background: #eaf5ff;
            padding: 40px;
            border: 1px solid #b9d7ef;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(31,95,147,0.08);
            width: 100%;
            max-width: 400px;
        }
        .register-card h2 {
            color: #123a5a;
            margin-bottom: 25px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        .form-group input:focus {
            border-color: #8ec5f4;
        }
        .btn-register {
            width: 100%;
            padding: 12px;
            background: var(--theme-primary-bg);
            color: var(--theme-primary-text);
            border: 1px solid var(--theme-primary-border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }
        .btn-register:hover {
            background: var(--theme-primary-hover-bg);
        }
        .error-msg {
            color: #dc3545;
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <h2>Register User</h2>
            {% if error %}
                <div class="error-msg">{{ error }}</div>
            {% endif %}
            <form action="/register" method="POST">
                <div class="form-group">
                    <label>New User Email</label>
                    <input type="email" name="email" required placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-register">Create Account</button>
                <div style="margin-top: 15px; text-align: center;">
                    <a href="{{ url_for('index') }}" style="color: #666; text-decoration: none; font-size: 0.9rem;">← Back to Dashboard</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
