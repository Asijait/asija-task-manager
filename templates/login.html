<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asija and Associates | Workspace Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #174a73;
            color: #123a5a;
        }
        .login-shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: minmax(320px, 0.95fr) minmax(360px, 1.05fr);
        }
        .brand-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 44px;
            color: #ffffff;
            background: linear-gradient(135deg, #123a5a 0%, #174a73 48%, #276b92 100%);
            position: relative;
            overflow: hidden;
        }
        .brand-panel::before {
            content: "";
            position: absolute;
            inset: auto -20% -35% 18%;
            height: 56%;
            border: 1px solid rgba(255, 255, 255, 0.16);
            transform: rotate(-8deg);
        }
        .brand-panel::after {
            content: "";
            position: absolute;
            inset: 12% 10% auto auto;
            width: 180px;
            height: 180px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 50%;
        }
        .brand-mark {
            font-size: 0.92rem;
            letter-spacing: 0;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }
        .brand-copy h1 {
            margin: 0;
            max-width: 620px;
            font-size: clamp(2.1rem, 4vw, 4rem);
            line-height: 1.08;
            font-weight: 700;
            letter-spacing: 0;
            position: relative;
            z-index: 1;
        }
        .brand-copy p {
            max-width: 520px;
            margin: 18px 0 0;
            color: rgba(255, 255, 255, 0.82);
            font-size: 1.05rem;
            line-height: 1.55;
            position: relative;
            z-index: 1;
        }
        .login-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
            background: #f4f8fb;
        }
        .login-card {
            width: min(430px, 100%);
            background: #ffffff;
            padding: 34px;
            border: 1px solid #d6e4ee;
            border-radius: 8px;
            box-shadow: 0 16px 40px rgba(18, 58, 90, 0.12);
        }
        .login-card h2 {
            margin: 0;
            color: #123a5a;
            font-size: 1.65rem;
            letter-spacing: 0;
        }
        .login-subtitle {
            margin: 8px 0 26px;
            color: #64748b;
            font-size: 0.96rem;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 7px;
            color: #243b53;
            font-size: 0.92rem;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px 13px;
            border: 1px solid #b8c9d6;
            border-radius: 6px;
            outline: none;
            color: #123a5a;
            font-size: 1rem;
            background: #ffffff;
        }
        .form-group input:focus {
            border-color: #1f5f93;
            box-shadow: 0 0 0 3px rgba(31, 95, 147, 0.14);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            margin-top: 4px;
            background: #123a5a;
            color: #ffffff;
            border: 1px solid #123a5a;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 650;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .btn-login:hover {
            background: #1f5f93;
            box-shadow: 0 8px 18px rgba(18, 58, 90, 0.18);
        }
        .error-msg {
            color: #b42318;
            background: #fff3f0;
            border: 1px solid #ffd2ca;
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }
        .secure-note {
            margin: 18px 0 0;
            color: #64748b;
            font-size: 0.84rem;
            text-align: center;
        }
        @media (max-width: 820px) {
            .login-shell {
                grid-template-columns: 1fr;
            }
            .brand-panel {
                min-height: 260px;
                padding: 28px;
            }
            .login-panel {
                padding: 24px 16px;
            }
            .login-card {
                padding: 26px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-shell">
        <section class="brand-panel">
            <div class="brand-mark">Asija and Associates</div>
            <div class="brand-copy">
                <h1>Professional Work Space</h1>
                <p>Access daily work tracking and debtor status tools from one secure workspace.</p>
            </div>
            <div class="brand-mark">Internal System Access</div>
        </section>

        <main class="login-panel">
            <div class="login-card">
                <h2>Workspace Login</h2>
                <p class="login-subtitle">Sign in to continue to Asija and Associates Work Space.</p>
                {% if error %}
                    <div class="error-msg">{{ error }}</div>
                {% endif %}
                <form action="/login" method="POST">
                    <div class="form-group">
                        <label>User Email</label>
                        <input type="email" name="email" required placeholder="name@asija.in" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" required placeholder="Password" autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-login">Sign In</button>
                </form>
                <p class="secure-note">Authorized users only</p>
            </div>
        </main>
    </div>
</body>
</html>
