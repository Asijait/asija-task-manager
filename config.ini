# Configuration Settings for Task Management System

[Flask]
# Flask application settings
DEBUG = True
HOST = 0.0.0.0
PORT = 5000
SECRET_KEY = your-secret-key-change-this

# Database settings
[Database]
DB_TYPE = sqlite
DB_NAME = tasks.db
DB_PATH = ./

# Application settings
[App]
APP_NAME = Task Management System
APP_VERSION = 1.0.0
TIMEZONE = Asia/Kolkata

# UI Settings
[UI]
ITEMS_PER_PAGE = 20
DATE_FORMAT = YYYY-MM-DD
CALENDAR_FIRST_DAY = 0  # 0 = Sunday, 1 = Monday

# Features
[Features]
ENABLE_EXPORT = True
ENABLE_PRINT = True
ENABLE_NOTIFICATIONS = True
ENABLE_DARK_MODE = False

# API Settings
[API]
ENABLE_CORS = False
API_RATE_LIMIT = False
REQUEST_TIMEOUT = 30
